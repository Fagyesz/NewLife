
<div class="submit-form">
  <div *ngIf="!submitted">
    <div class="form-group">
      <label for="title">Title</label>
      <input
        type="text"
        class="form-control"
        id="title"
        required
        [(ngModel)]="event.title"
        name="title"
      />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input
        class="form-control"
        id="description"
        required
        [(ngModel)]="event.description"
        name="description"
      />
    </div>

    <button (click)="saveEvent()" class="btn btn-success">Submit</button>
  </div>

  <div *ngIf="submitted">
    <h4>You submitted successfully!</h4>
    <button class="btn btn-success" (click)="newEvent()">Add</button>
  </div>
</div>

<form method="dialog" class="modal-box">
  <!-- Modal content -->

  <!-- Modal header -->
  <div
    class="flex items-start justify-between border-b rounded-t dark:border-gray-700"
  >
    <h3 class="text-xl font-semibold dark:text-white">Add Event</h3>
    <div class="modal-action">
      <button
        class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center dark:hover:bg-gray-700 dark:hover:text-white"
      >
        <!-- if there is a button in form, it will close the modal -->

        <svg
          class="w-5 h-5"
          fill="currentColor"
          viewBox="0 0 20 20"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            fill-rule="evenodd"
            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
            clip-rule="evenodd"
          ></path>
        </svg>
      </button>
    </div>
  </div>
  <!-- Modal body -->
  <div class="p-6 space-y-6 pb-0">
    <form action="#">
      <div class="grid grid-cols-6 gap-6">
        <div class="col-span-6 sm:col-span-6">
          <label
            for="title"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Title</label
          >
          <input
            type="text"
            name="title"
            id="title"
            class="shadow-sm bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
            placeholder="Title"
            required
          />
        </div>
        <div class="col-span-6 sm:col-span-6">
          <label
            for="description"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Description</label
          >
          <textarea
            class="textarea textarea-bordered w-full"
            placeholder="Description"
          ></textarea>
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label
            for=" start_time"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Date</label
          >

          <div
            class="relative mb-3"
            id="datepicker-disable-past"
            data-te-input-wrapper-init
          >
            <input
              type="text"
              class="peer block min-h-[auto] w-full rounded border-0 bg-transparent px-3 py-[0.32rem] leading-[1.6] outline-none transition-all duration-200 ease-linear focus:placeholder:opacity-100 peer-focus:text-primary data-[te-input-state-active]:placeholder:opacity-100 motion-reduce:transition-none dark:text-neutral-200 dark:placeholder:text-neutral-200 dark:peer-focus:text-primary [&:not([data-te-input-placeholder-active])]:placeholder:opacity-0"
              placeholder="Select a date"
            />
            <label
              for="floatingInput"
              class="pointer-events-none absolute left-3 top-0 mb-0 max-w-[90%] origin-[0_0] truncate pt-[0.37rem] leading-[1.6] text-neutral-500 transition-all duration-200 ease-out peer-focus:-translate-y-[0.9rem] peer-focus:scale-[0.8] peer-focus:text-primary peer-data-[te-input-state-active]:-translate-y-[0.9rem] peer-data-[te-input-state-active]:scale-[0.8] motion-reduce:transition-none dark:text-neutral-200 dark:peer-focus:text-primary"
              >Select a date</label
            >
          </div>
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label
            for="position"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Date to</label
          >
          <input
            type="text"
            name="position"
            id="position"
            class="shadow-sm bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
            placeholder="e.g. React developer"
            required
          />
        </div>

        <div class="col-span-6 sm:col-span-3">
          <label
            for="location"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Location</label
          >
          <input
            type="text"
            name="location"
            id="location"
            class="shadow-sm bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
            placeholder="Budapest"
            required
          />
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label
            for="position"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Organizer</label
          >
          <input
            type="text"
            name="organizer"
            id="organizer"
            class="shadow-sm bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
            placeholder="You"
            required
          />
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label
            for="position"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Ticket price</label
          >
          <input
            type="text"
            name="ticket_price"
            id="ticket_price"
            class="shadow-sm bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
            placeholder="2000 Huf"
            required
          />
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label
            for="position"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Tickets available</label
          >
          <input
            type="text"
            name="tickets_available"
            id="tickets_available"
            class="shadow-sm bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
            placeholder="100"
            required
          />
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label
            for="position"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Event image</label
          >
          <input
            type="text"
            name="event_image"
            id="event_image"
            class="shadow-sm bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
            placeholder="event_image_location_picker"
            required
          />
        </div>
        <div class="col-span-6 sm:col-span-3">
          <label
            for="position"
            class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
            >Published?</label
          >
          
          <label class="check-container">
            <input type="checkbox" id="published" name="published" class="mr-3" [checked]="published" (change)="published = !published">
            <svg viewBox="0 0 64 64" height="1em" width="1em">
              <path d="M 0 16 V 56 A 8 8 90 0 0 8 64 H 56 A 8 8 90 0 0 64 56 V 8 A 8 8 90 0 0 56 0 H 8 A 8 8 90 0 0 0 8 V 16 L 32 48 L 64 16 V 8 A 8 8 90 0 0 56 0 H 8 A 8 8 90 0 0 0 8 V 56 A 8 8 90 0 0 8 64 H 56 A 8 8 90 0 0 64 56 V 16" pathLength="575.0541381835938" class="path"></path>
            </svg>
          </label>
        </div>
       
      </div>

      <!-- Modal footer -->
      <div
        class="items-center pt-6 border-t border-gray-200 rounded-b dark:border-gray-700"
      >
        <button
          class="text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800"
          type="submit"
        >
          Save
        </button>
      </div>
    </form>
  </div>
</form>

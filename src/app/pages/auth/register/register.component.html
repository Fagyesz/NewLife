<div class="bg-white bg-opacity-50 rounded-t-lg p-8 border-2">
  <p class="text-center text-sm text-gray-400 font-light">Sign up with</p>
  <div>
    <div class="flex items-center justify-center space-x-4 mt-3">
      <button
        class="flex items-center py-2 px-4 text-sm uppercase rounded bg-white hover:bg-gray-100 text-indigo-500 border border-transparent hover:border-transparent hover:text-gray-700 shadow-md hover:shadow-lg font-medium transition transform hover:-translate-y-0.5"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 16 16"
          class="w-6 h-6 mr-3"
        >
          <path
            fill-rule="evenodd"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
          ></path>
        </svg>
        Github
      </button>
      <button
        class="flex items-center py-2 px-4 text-sm uppercase rounded bg-white hover:bg-gray-100 text-indigo-500 border border-transparent hover:border-transparent hover:text-gray-700 shadow-md hover:shadow-lg font-medium transition transform hover:-translate-y-0.5"
        (click)="authService.GoogleAuth()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-6 h-6 mr-3"
          viewBox="0 0 48 48"
        >
          <path
            fill="#fbc02d"
            d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"
          />
          <path
            fill="#e53935"
            d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"
          />
          <path
            fill="#4caf50"
            d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
          />
          <path
            fill="#1565c0"
            d="M43.611 20.083 43.595 20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"
          />
        </svg>
        Google
      </button>
    </div>
  </div>
</div>
<div class="bg-gray-100 rounded-b-lg py-12 px-4 lg:px-24 border-2 border-t-0">
  <p class="text-center text-sm text-gray-500 font-light">
    Or sign up with credentials
  </p>

  <!-- Credential form -->
  <form [formGroup]="registerForm" class="mt-6" (ngSubmit)="onSubmit()">
    <!-- email -->
    <div class="form-group relative mt-3">
      <input
        class="appearance-none border pl-12 border-gray-100 shadow-sm focus:shadow-md focus:placeholder-gray-600 transition rounded-md w-full py-3 text-gray-600 leading-tight focus:outline-none focus:ring-gray-600 focus:shadow-outline invalid:[&:not(:placeholder-shown):not(:focus)]:border-red-500 peer"
        type="email"
        placeholder="Email"
        formControlName="email"
        #userEmail
        [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
        [class.invalid-input]="f['email'].errors && f['email'].touched"
      />

      <div class="absolute left-0 inset-y-0 flex items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-7 w-7 ml-3 text-gray-400 p-1"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"
          />
          <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
        </svg>
      </div>

      <!-- email error -->
    </div>

    <div
      *ngIf="f['email'].errors && f['email'].touched"
      class="invalid-feedback"
    >
      <div
        class="-mt-2 p-2 pt-4 bg-white appearance-none border border-red-500 shadow-sm rounded-md w-full py-3 text-gray-600 leading-tight text-center"
        *ngIf="f['email'].errors['pattern']"
      >
        <p>Invalid email format.</p>
      </div>
    </div>
    <!-- <div
  *ngIf=" f['email'].errors && f['email'].touched"
  class="invalid-feedback"
>
  <div *ngIf="f['email'].errors['required']">Email is required</div>
  <div *ngIf="f['email'].errors['pattern']">Email is invalid</div>
</div> -->

    <!-- password  -->
    <div class="form-group relative mt-3">
      <input
        class="appearance-none border pl-12 border-gray-100 shadow-sm focus:shadow-md focus:placeholder-gray-600 transition rounded-md w-full py-3 text-gray-600 leading-tight focus:outline-none focus:ring-gray-600 focus:shadow-outline invalid:[&:not(:placeholder-shown):not(:focus)]:border-red-500 peer"
        type="password"
        placeholder="password"
        autocomplete="on"
        formControlName="password"
        #userPwd
        [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
        [class.invalid-input]="f['password'].errors && f['password'].touched"
        required
        pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&*()])?.{8,}$"
        title="Your password must be at least 8 characters long and include at least one letter, one digit, and may include one special character (!@#$%^&*())."
      />

      <!-- password error -->
      <div class="absolute left-0 inset-y-0 flex items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-7 w-7 ml-3 text-gray-400 p-1"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H7V7a3 3 0 015.905-.75 1 1 0 001.937-.5A5.002 5.002 0 0010 2z"
          />
        </svg>
      </div>
    </div>
    <div
      *ngIf="f['password'].errors && f['password'].touched"
      class="invalid-feedback"
    >
      <div
        class="-mt-2 p-2 pt-4 bg-white appearance-none border border-red-500 shadow-sm rounded-md w-full py-3 text-gray-600 leading-tight text-center"
        *ngIf="f['password'].errors['pattern']"
      >
        <p>Your password must be at least 8 characters long</p>
        <p>and include at least one letter and one digit.</p>
      </div>
    </div>

    <!-- password confirm -->
    <div class="form-group relative mt-3">
      <input
        class="appearance-none border pl-12 border-gray-100 shadow-sm focus:shadow-md focus:placeholder-gray-600 transition rounded-md w-full py-3 text-gray-600 leading-tight focus:outline-none focus:ring-gray-600 focus:shadow-outline"
        id="password_confirm"
        type="password"
        placeholder="confirmPassword"
        #userPwdConfirm
        formControlName="confirmPassword"
        [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
        [class.invalid-input]="
          f['confirmPassword'].errors && f['confirmPassword'].touched
        "
      />

      <!-- password error -->
      <div class="absolute left-0 inset-y-0 flex items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-7 w-7 ml-3 text-gray-400 p-1"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H7V7a3 3 0 015.905-.75 1 1 0 001.937-.5A5.002 5.002 0 0010 2z"
          />
        </svg>
      </div>

      <!-- password confirm error -->
    </div>
    <div
      *ngIf="f['confirmPassword'].errors && f['confirmPassword'].touched"
      class="invalid-feedback"
    >
      <div
        class="-mt-2 p-2 pt-4 bg-white appearance-none border border-red-500 shadow-sm rounded-md w-full py-3 text-gray-600 leading-tight text-center"
        *ngIf="f['confirmPassword'].errors?.['mismatch']"
      >
        Passwords do not match
      </div>
    </div>

    <!-- policy -->
    <div
      class="form-group form-check mt-4 flex flex-col items-center text-gray-500"
    >
      <label class="flex items-center cursor-pointer gap-2">
        <label class="check-container">
          <input type="checkbox" id="policy" name="policy" class="mr-3" />
          <svg viewBox="0 0 64 64" height="1em" width="1em">
            <path
              d="M 0 16 V 56 A 8 8 90 0 0 8 64 H 56 A 8 8 90 0 0 64 56 V 8 A 8 8 90 0 0 56 0 H 8 A 8 8 90 0 0 0 8 V 16 L 32 48 L 64 16 V 8 A 8 8 90 0 0 56 0 H 8 A 8 8 90 0 0 0 8 V 56 A 8 8 90 0 0 8 64 H 56 A 8 8 90 0 0 64 56 V 16"
              pathLength="575.0541381835938"
              class="path"
            ></path>
          </svg>
        </label>
        <span translate>
          register.agreement
          <a class="text-indigo-400 hover:text-indigo-500" translate
            >register.policy</a
          >
        </span>
      </label>

      <!-- register button -->
      <button
        class="mt-8 text-white py-2 px-4 uppercase rounded bg-indigo-500 hover:bg-indigo-600 shadow hover:shadow-lg font-medium transition transform hover:-translate-y-0.5 group-invalid:pointer-events-none group-invalid:opacity-30"
        (click)="authService.SignUp(userEmail.value, userPwd.value)"
        [disabled]="!registerForm.valid"
      >
        Create Account
      </button>
    </div>
  </form>
</div>

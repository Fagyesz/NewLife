<div class="p-0 shadow mt-20" *ngIf="authService.userData as user">
  <div class="grid grid-cols-1 md:grid-cols-3">
    <div
      class="grid grid-cols-3 text-center order-last md:order-first mt-20 md:mt-0"
    >
      <div class="p-3">
        <p class="font-bold text-gray-700 text-xl">22</p>
        <a class="text-gray-400">Your Events</a>
      </div>
      
    </div>
    <div class="relative">
      <div
        class="w-48 h-48 bg-white-50s mx-auto rounded-full shadow-2xl absolute inset-x-0 top-0 -mt-24 flex items-center justify-center text-indigo-500"
      >
        <img class="rounded-full" src="{{ user.photoURL }}" alt="avatar" />
      </div>
    </div>

    <div class="space-x-8 flex justify-between mt-32 md:mt-0 md:justify-center">
      <button
      (click)="setOwner()"
        class="text-white py-2 px-4 uppercase rounded bg-blue-400 hover:bg-blue-500 shadow hover:shadow-lg font-medium transition transform hover:-translate-y-0.5"
      >
        Connect
      </button>
      <button
        class="text-white py-2 px-4 uppercase rounded bg-gray-700 hover:bg-gray-800 shadow hover:shadow-lg font-medium transition transform hover:-translate-y-0.5"
      >
        Contact
      </button>
    </div>
  </div>

  <div class="mt-20 text-center border-b ">
    <h1 class="text-4xl font-medium text-gray-700">
      <strong>{{ user.displayName ? user.displayName : "User" }}</strong>
    </h1>
   

    <p class="p-6 text-gray-500">{{title?title:'Error title missing'}}</p>
  </div>
  <div class="p-6 flex flex-col justify-center">
    <p class="text-gray-600 text-center font-light lg:px-16">
      {{description ? description:'Error desc missing'}}
    </p>
    
  </div>

</div>
